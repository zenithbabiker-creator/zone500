name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Gradle and Build
        run: |
          # 1. تحميل وتثبيت Gradle 8.9
          echo "Installing Gradle 8.9..."
          wget -q https://services.gradle.org/distributions/gradle-8.9-bin.zip
          unzip -q gradle-8.9-bin.zip
          GRADLE_BIN=$(pwd)/gradle-8.9/bin/gradle
          
          # 2. تحديد مسار المشروع
          BUILD_FILE=$(find . -name "build.gradle*" | head -n 1)
          PROJECT_DIR=$(dirname "$BUILD_FILE")
          
          # 3. معالجة التضارب في المراجع (إصلاح JitPack 401)
          # نقوم بتغيير الإصدار المسبب للمشكلة 1.0.10 إلى الإصدار المستقر 0.10.0
          sed -i 's|io.github.sceneview:ar:1.0.10|io.github.sceneview:ar:0.10.0|g' "$BUILD_FILE"
          
          # 4. إجبار إعدادات AndroidX (تجاوز ملف gradle.properties)
          cd "$PROJECT_DIR"
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          # 5. تنظيف وتنفيذ البناء
          $GRADLE_BIN clean assembleDebug \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g" \
            -Pandroid.useAndroidX=true \
            -Pandroid.enableJetifier=true \
            -x lint -x test

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LandscapeDesignApp
          path: "**/app-debug.apk"
